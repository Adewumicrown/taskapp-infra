apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: default
  annotations:
    # Tell NGINX which ingress controller to use
    kubernetes.io/ingress.class: nginx
    # Automatically get SSL certificate from Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Redirect all HTTP traffic to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  # TLS configuration — cert-manager creates these secrets automatically
  tls:
  - hosts:
    - app.taskapp.name.ng
    secretName: taskapp-frontend-tls
  - hosts:
    - backend.taskapp.name.ng
    secretName: taskapp-backend-tls

  rules:
  # Frontend routing
  - host: app.taskapp.name.ng
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

  # Backend routing
  - host: backend.taskapp.name.ng
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
